<section id="contact" class="contact section">
  <div class="wrap contact__inner">

    <!-- Left copy -->
    <div class="contact__copy">
      <span class="section-label">— Get In Touch</span>
      <h2 class="h2 contact__headline">Let us Start Growing Your Business</h2>
      <p class="body-text contact__body">
        Book a free discovery call. We will audit your current online presence and show you exactly what we can do.
      </p>
      <div class="contact__details">
        <div class="contact__detail">
          <span class="contact__detail-label">WhatsApp</span>
          <span class="contact__detail-val">{{ config.business.phone }}</span>
        </div>
        <div class="contact__detail">
          <span class="contact__detail-label">Email</span>
          <span class="contact__detail-val">{{ config.business.email }}</span>
        </div>
        <div class="contact__detail">
          <span class="contact__detail-label">Location</span>
          <span class="contact__detail-val">{{ config.business.address }}</span>
        </div>
      </div>
    </div>

    <!-- Right form -->
    <div class="contact__form-wrap">
      <div class="contact__form">
        <input class="contact__input" type="text" placeholder="Your Name" [(ngModel)]="form.name" />
        <input class="contact__input" type="text" placeholder="Business Name" [(ngModel)]="form.business" />
        <input class="contact__input" type="tel" placeholder="Phone Number" [(ngModel)]="form.phone" />
        <input class="contact__input" type="email" placeholder="Email Address" [(ngModel)]="form.email" />

        <select class="contact__input contact__select" [(ngModel)]="form.pkg">
          <option value="">Select a Package</option>
          <option *ngFor="let pkg of config.packages" [value]="pkg.name">
            {{ pkg.name }} — ₦{{ pkg.price }}{{ pkg.period }}
          </option>
        </select>

        <textarea
          class="contact__input contact__textarea"
          placeholder="Tell us about your business..."
          rows="4"
          [(ngModel)]="form.message"
        ></textarea>

        <button class="contact__submit" (click)="sendViaWhatsApp()">
          Send via WhatsApp →
        </button>
      </div>
    </div>

  </div>
</section>
